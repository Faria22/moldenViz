name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  core-install:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.14"]

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install core package
      run: |
        python -m pip install --upgrade pip
        python -m pip install .

    - name: Verify core imports without GUI dependencies
      run: |
        python - <<'PY'
        import importlib.util

        from moldenViz import Parser, Tabulator

        assert Parser.__module__ == "moldenViz.parser"
        assert Tabulator.__module__ == "moldenViz.tabulator"
        for module in ("matplotlib", "pydantic", "pyvista", "pyvistaqt", "PySide6", "qtpy", "toml"):
            assert importlib.util.find_spec(module) is None, module
        PY

    - name: Verify core CLI metadata
      run: moldenViz --version

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libegl1 python3-tk
    
    - name: Install hatch
      run: |
        python -m pip install --upgrade pip
        python -m pip install hatch
    
    - name: Run linting
      run: |
        hatch run lint
    
    - name: Run type checking
      run: |
        hatch run typecheck
    
    - name: Run tests
      run: |
        hatch run test

  docs:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install documentation dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install '.[docs]'

    - name: Build documentation
      run: make -C docs html

  benchmark-smoke:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Set up authoritative benchmark Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Install hatch
      run: |
        python -m pip install --upgrade pip
        python -m pip install hatch

    - name: Validate ASV suite in an isolated environment
      run: hatch run bench-smoke
