name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  core-install:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.14"]

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v8
      with:
        version: "0.11.29"

    - name: Install core package
      run: uv sync --locked --no-default-groups

    - name: Verify core imports without GUI dependencies
      run: |
        uv run --locked --no-default-groups python - <<'PY'
        import importlib.util

        from moldenViz import Parser, Tabulator

        assert Parser.__module__ == "moldenViz.parser"
        assert Tabulator.__module__ == "moldenViz.tabulator"
        for module in ("matplotlib", "pydantic", "pyvista", "pyvistaqt", "PySide6", "qtpy", "toml"):
            assert importlib.util.find_spec(module) is None, module
        PY

    - name: Verify core CLI metadata
      run: uv run --locked --no-default-groups moldenViz --version

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v5
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v8
      with:
        version: "0.11.29"

    - name: Install just
      uses: extractions/setup-just@v3
      with:
        just-version: "1.57.0"

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libegl1 python3-tk

    - name: Sync locked development environment
      run: uv sync --locked --group dev

    - name: Run linting
      run: just lint

    - name: Run type checking
      run: just typecheck

    - name: Run tests
      run: just test

  docs:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Install uv
      uses: astral-sh/setup-uv@v8
      with:
        version: "0.11.29"

    - name: Install just
      uses: extractions/setup-just@v3
      with:
        just-version: "1.57.0"

    - name: Sync locked documentation environment
      run: uv sync --locked --group docs

    - name: Build documentation
      run: just docs
