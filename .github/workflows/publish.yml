name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          version: "0.11.29"

      - name: Install just
        uses: extractions/setup-just@v3
        with:
          just-version: "1.57.0"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 python3-tk

      - name: Verify lockfile
        run: uv lock --check

      - name: Determine package version
        id: package_version
        run: echo "version=$(uv version --short)" >> "$GITHUB_OUTPUT"

      - name: Verify package version matches tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/}
          TAG_VERSION_STRIPPED=${TAG_VERSION#v}
          PACKAGE_VERSION=$(uv version --short)
          if [ "$TAG_VERSION_STRIPPED" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package version ($PACKAGE_VERSION)"
            exit 1
          fi
          echo "Version check passed: $PACKAGE_VERSION"

      - name: Run checks and build distributions
        run: just all build

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
